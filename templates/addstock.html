{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="all-title-box">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <h2>AddStock</h2>
                <ul class="breadcrumb">
                    <li class="breadcrumb-item"><a href="#">Shop</a></li>
                    <li class="breadcrumb-item active">AddStock</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<div class="container text-center w-50 p-5 mt-5 border border-2">
    <form method="post" >
        {% csrf_token %}
        {{form|crispy}}
        <input type="submit" class="btn btn danger">
    </form>
</div>
{% endblock %}
