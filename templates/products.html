{% extends 'base.html' %}
{% load static %}
{% block content %}
    <!-- Start Products  -->
<div class="container-fluid mt-3">
    <img src="{{category.image.url}}" height="500px" width="100%">
</div>
    <div class="products-box">
        <div class="container">

            <div class="row">
                <div class="col-lg-12">
                    <div class="title-all text-center">

                        <h1>{{category.name}}</h1>
                        <p>{{category.description}}</p>

                    </div>
                </div>
            </div>





 <div class="row special-list">
    {% for i in category.products.all %}

    <div class="col-lg-3 col-md-6 special-grid">
        <div class="products-single fix">
            <div class="box-img-hover">
                <div class="type-lb">
                    <p class="sale">Sale</p>
                </div>

                <img src="{{ i.image.url }}" class="img-fluid" alt="Image">

                <div class="mask-icon">
                    <ul>
                        <li><a href="#"><i class="fas fa-eye"></i></a></li>
                        <li><a href="#"><i class="fas fa-sync-alt"></i></a></li>
                        <li><a href="#"><i class="far fa-heart"></i></a></li>
                    </ul>

                    <a class="cart" href="{% url 'shop:productdetail' i.id %}">
                        Details
                    </a>
                </div>
            </div>

            <div class="why-text">
                <h4>{{ i.name }}</h4>
                <h5>{{ i.price }}</h5>
                <p>id={{ i.id }}</p>
            </div>
        </div>
    </div>

    {% endfor %}
</div></div>


    <!-- End Products  -->
{% endblock %}
