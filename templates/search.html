{% extends 'base.html' %}
{% load static %}
{% block content %}
    <!-- Start Products  -->
    <div class="all-title-box">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <h2>SEARCH</h2>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="#">Search</a></li>
                        <li class="breadcrumb-item active">search</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>


<div class="container p-5">
  {% if products %}
      <div class="row special-list">
    {% for i in products %}
    <div class="col-lg-3 col-md-6 special-grid best-seller">
        <div class="products-single fix">
            <div class="box-img-hover">
                <img src="{{ i.image.url }}" alt="Image">
                <div class="mask-icon">
                    <a class="cart" href="{% url 'shop:productdetail' i.id %}">
                        Details
                    </a>
                </div>
            </div>

            <div class="why-text">
                <h4>{{ i.name }}</h4>
                <h5>{{ i.price }}</h5>
                <p>id={{ i.id }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
{% else %}
<h4 class="text-center">No search result found</h4>
{% endif %}
</div>

    <!-- End Products  -->
{% endblock %}
